<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vibo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 如果 iframe 被阻止加载，显示备用内容 */
        .fallback {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .fallback.show {
            display: flex;
        }

        .fallback-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .fallback-box .icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .fallback-box h1 {
            color: #333;
            font-size: 22px;
            margin-bottom: 15px;
        }

        .fallback-box p {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .fallback-box .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 36px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
        }

        .fallback-box .tip {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            font-size: 13px;
            color: #856404;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <iframe id="mainFrame" src="https://y3vhzd3sn5.coze.site" 
            allow="accelerometer; camera; microphone; geolocation"
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads"
            loading="eager">
    </iframe>

    <div class="fallback" id="fallback">
        <div class="fallback-box">
            <div class="icon">📱</div>
            <h1>请在浏览器中打开</h1>
            <p>当前环境无法直接加载页面，请点击下方按钮在浏览器中打开</p>
            <a href="https://y3vhzd3sn5.coze.site" class="btn">在浏览器中打开</a>
            <div class="tip">
                💡 提示：点击右上角「...」菜单，选择「在浏览器中打开」也可以正常访问
            </div>
        </div>
    </div>

    <script>
        const iframe = document.getElementById('mainFrame');
        const fallback = document.getElementById('fallback');

        // 检测 iframe 是否加载成功
        let loaded = false;
        
        iframe.onload = function() {
            loaded = true;
        };

        iframe.onerror = function() {
            fallback.classList.add('show');
            iframe.style.display = 'none';
        };

        // 5秒超时检测
        setTimeout(function() {
            if (!loaded) {
                // iframe 可能被阻止了
                fallback.classList.add('show');
                iframe.style.display = 'none';
            }
        }, 5000);
    </script>
</body>
</html>
